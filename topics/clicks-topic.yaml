---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: clicks
  namespace: confluent
spec:
  kafkaClusterRef:
    name: kafka
    namespace: confluent
  replicas: 1
  partitionCount: 3
  configs:
    cleanup.policy: "delete"
---
# VALUE schema for clickstream events
apiVersion: v1
kind: ConfigMap
metadata:
  name: clicks-value-avro-schema
  namespace: confluent
data:
  schema: |
    {
      "type": "record",
      "name": "clicks",
      "namespace": "io.confluent.training.avro",
      "fields": [
        { "name": "ip", "type": "string" },
        { "name": "userid", "type": "int" },
        { "name": "remote_user", "type": "string" },
        { "name": "time", "type": "string" },
        { "name": "_time", "type": "long" },
        { "name": "request", "type": "string" },
        { "name": "status", "type": "string" },
        { "name": "bytes", "type": "string" },
        { "name": "referrer", "type": "string" },
        { "name": "agent", "type": "string" }
      ]
    }
---
apiVersion: platform.confluent.io/v1beta1
kind: Schema
metadata:
  name: clicks-value
  namespace: confluent
spec:
  schemaRegistryClusterRef:
    name: schemaregistry
    namespace: confluent
  data:
    configRef: clicks-value-avro-schema
    format: avro
  compatibilityLevel: BACKWARD
