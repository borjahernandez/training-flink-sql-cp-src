---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: user-actions
  namespace: confluent
spec:
  kafkaClusterRef:
    name: kafka
    namespace: confluent
  replicas: 1
  partitionCount: 2
  configs:
    cleanup.policy: "delete"
---
# VALUE schema (user STRING, action STRING, timestamp TIMESTAMP_LTZ(3))
# TIMESTAMP_LTZ(3) maps to Avro long with logicalType=timestamp-millis
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-actions-value-avro-schema
  namespace: confluent
data:
  schema: |
    {
      "type": "record",
      "name": "UserAction",
      "namespace": "io.confluent.training.avro",
      "fields": [
        { "name": "user", "type": "string" },
        { "name": "action", "type": "string" },
        {
          "name": "ts",
          "type": { "type": "long", "logicalType": "timestamp-millis" }
        }
      ]
    }
---
apiVersion: platform.confluent.io/v1beta1
kind: Schema
metadata:
  name: user-actions-value
  namespace: confluent
spec:
  schemaRegistryClusterRef:
    name: schemaregistry
    namespace: confluent
  data:
    configRef: user-actions-value-avro-schema
    format: avro
  compatibilityLevel: BACKWARD
